<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vila Naval de Tabatinga - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>

<body class="login-bg">
    <div class="login-container">
        <div class="glass-panel login-card">
            <div class="logo-container">
                <!-- Using the generated logo image conceptually -->
                <div class="logo-circle" style="background: transparent; box-shadow: none;">
                    <img src="logo.png" alt="Logo Vila Naval" style="width: 100px; height: 100px; object-fit: contain;">
                </div>
                <h1>Vila Naval Tabatinga</h1>
                <p>Gestão e Convivência</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <i class="ri-user-3-line"></i>
                    <input type="text" id="nip" placeholder="NIP (00.0000.00)" required maxlength="10">
                </div>
                <div class="input-group" style="position:relative;">
                    <i class="ri-lock-line"></i>
                    <input type="password" id="senha" placeholder="Senha" required style="padding-right: 40px;">
                    <i class="ri-eye-line" id="toggleSenhaLog" style="position:absolute; left: auto !important; right: 15px !important; top: 50%; transform: translateY(-50%); cursor: pointer; z-index: 100; pointer-events: all; pointer-events: auto; color: var(--text-muted);" onclick="togglePwd('senha', 'toggleSenhaLog')"></i>
                </div>
                <div class="login-options">
                    <label class="checkbox-container">
                        <input type="checkbox">
                        <span class="checkmark"></span>
                        Lembrar-me
                    </label>
                    <a href="#" class="forgot-pwd">Esqueci a senha</a>
                </div>
                <button type="submit" class="btn btn-primary btn-block">
                    Acessar <i class="ri-arrow-right-line"></i>
                </button>
            </form>

            <div class="login-footer">
                <p>Primeiro acesso? <a href="#">Solicite seu cadastro</a></p>
            </div>
        </div>

        <!-- Créditos do Desenvolvedor -->
        <div style="text-align: center; margin-top: 25px; color: rgba(255,255,255,0.95); font-size: 0.95rem; font-weight: 500; text-shadow: 1px 1px 3px rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; gap: 15px;">
            <img src="distintivo.png" alt="Distintivo C-ESPMOR" style="height: 38px; object-fit: contain; filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.6));">
            <span>Desenvolvido pelo SOMor SACRAMENTO</span>
            <img src="distintivo.png" alt="Distintivo C-ESPMOR" style="height: 38px; object-fit: contain; filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.6));">
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>

    <!-- Modal Primeiro Acesso -->
    <div id="modalMudarSenha" class="modal-overlay" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div class="modal-content glass-panel" style="max-width: 400px; text-align: center; padding: 25px; border-radius: 12px; background: rgba(255,255,255,0.9);">
            <h3 style="color: var(--primary-color); margin-bottom: 10px;">Primeiro Acesso</h3>
            <p style="color: var(--text-muted); margin-bottom: 20px; font-size: 0.9rem;">Por medida de segurança, crie uma senha forte e exclusiva para acessar o sistema da Vila Naval.</p>
            <div class="input-group" style="position:relative; margin-bottom:10px;">
                <i class="ri-lock-line" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                <input type="password" id="novaSenha" placeholder="Digite a nova senha" style="width: 100%; padding: 12px 40px; border-radius: 8px; border: 1px solid var(--glass-border);" required>
                <i class="ri-eye-line" id="toggleP1" style="position:absolute; left: auto !important; right: 15px !important; top: 50%; transform: translateY(-50%); cursor: pointer; z-index: 100; pointer-events: all; pointer-events: auto; color: var(--text-muted);" onclick="togglePwd('novaSenha', 'toggleP1')"></i>
            </div>
            <div class="input-group" style="position:relative; margin-bottom:15px;">
                <i class="ri-lock-line" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                <input type="password" id="novaSenhaConf" placeholder="Confirme a nova senha" style="width: 100%; padding: 12px 40px; border-radius: 8px; border: 1px solid var(--glass-border);" required>
                <i class="ri-eye-line" id="toggleP2" style="position:absolute; left: auto !important; right: 15px !important; top: 50%; transform: translateY(-50%); cursor: pointer; z-index: 100; pointer-events: all; pointer-events: auto; color: var(--text-muted);" onclick="togglePwd('novaSenhaConf', 'toggleP2')"></i>
            </div>
            <button id="btnSalvarSenha" class="btn btn-primary" style="width: 100%; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; z-index: 100; pointer-events: all; pointer-events: auto; border: none;">Salvar e Acessar</button>
        </div>
    </div>

</body>
</html>
